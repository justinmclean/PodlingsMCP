name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: python -m pip install --upgrade pip ruff mypy coverage

      - name: Check formatting
        run: make check-format

      - name: Lint
        run: make lint

      - name: Type check
        run: make typecheck

      - name: Run tests
        run: make test
